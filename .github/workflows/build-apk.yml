name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Find Android project and Gradle version
        id: project
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS_PATH="$(find "$GITHUB_WORKSPACE" \
            -type f \
            \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
            -not -path "*/.gradle/*" \
            -not -path "*/build/*" \
            -print \
            -quit)"

          if [ -z "$SETTINGS_PATH" ]; then
            echo "::error::فایل settings.gradle یا settings.gradle.kts پیدا نشد."
            find "$GITHUB_WORKSPACE" -maxdepth 5 -type f | sort | head -n 300
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_PATH")"
          WRAPPER_PROPERTIES="$PROJECT_DIR/gradle/wrapper/gradle-wrapper.properties"

          if [ -f "$WRAPPER_PROPERTIES" ]; then
            GRADLE_VERSION="$(sed -n \
              's#.*gradle-\([0-9][0-9.]*\)-\(bin\|all\)\.zip.*#\1#p' \
              "$WRAPPER_PROPERTIES" | head -n 1)"
          else
            GRADLE_VERSION=""
          fi

          if [ -z "$GRADLE_VERSION" ]; then
            GRADLE_VERSION="9.3.1"
            echo "Gradle version was not found; using fallback $GRADLE_VERSION"
          fi

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "gradle_version=$GRADLE_VERSION" >> "$GITHUB_OUTPUT"

          echo "Android project:"
          echo "$PROJECT_DIR"

          echo "Gradle version:"
          echo "$GRADLE_VERSION"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: ${{ steps.project.outputs.gradle_version }}
          validate-wrappers: false

      - name: Prepare example environment file
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f ".env.example" ]; then
            printf '%s\n' \
              '# Example environment variables' \
              '# Do not place real secrets in this file.' \
              > .env.example
          fi

          echo ".env.example is ready."

      - name: Verify Android project
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f "settings.gradle.kts" ] && [ ! -f "settings.gradle" ]; then
            echo "::error::فایل تنظیمات Gradle پیدا نشد."
            exit 1
          fi

          if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
            echo "::error::فایل اصلی build.gradle پیدا نشد."
            exit 1
          fi

          if [ ! -d "app" ]; then
            echo "::error::پوشه app پیدا نشد."
            exit 1
          fi

          if [ ! -f "app/build.gradle.kts" ] && [ ! -f "app/build.gradle" ]; then
            echo "::error::فایل Build ماژول app پیدا نشد."
            exit 1
          fi

          echo "Project structure is valid."
          java -version
          gradle --version

      - name: Create debug keystore
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f "debug.keystore" ]; then
            keytool -genkeypair \
              -keystore "debug.keystore" \
              -storepass "android" \
              -alias "androiddebugkey" \
              -keypass "android" \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" \
              -noprompt
          fi

          test -f "debug.keystore" || {
            echo "::error::debug.keystore ساخته نشد."
            exit 1
          }

          echo "Debug keystore is ready."

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          gradle :app:assembleDebug \
            --stacktrace \
            --no-daemon

      - name: Prepare APK artifact
        shell: bash
        run: |
          set -euo pipefail

          APK_DIRECTORY="$PROJECT_DIR/app/build/outputs/apk/debug"

          if [ ! -d "$APK_DIRECTORY" ]; then
            echo "::error::پوشه خروجی APK ساخته نشد."
            exit 1
          fi

          APK_FILE="$(find "$APK_DIRECTORY" \
            -type f \
            -name "*.apk" \
            ! -name "*unaligned*" \
            -print \
            -quit)"

          if [ -z "$APK_FILE" ]; then
            echo "::error::فایل APK پیدا نشد."
            find "$PROJECT_DIR/app/build" -type f | sort | tail -n 200 || true
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp "$APK_FILE" "$GITHUB_WORKSPACE/artifacts/app-debug.apk"

          echo "APK created successfully:"
          ls -lh "$GITHUB_WORKSPACE/artifacts/app-debug.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: Android-debug-APK
          path: artifacts/app-debug.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
