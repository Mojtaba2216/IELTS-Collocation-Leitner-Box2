name: Build Signed Release APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-release:
    name: Build Signed Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle 9.3.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.3.1"
          validate-wrappers: false

      - name: Find Android project
        shell: bash
        run: |
          set -euo pipefail

          SETTINGS_PATH="$(find "$GITHUB_WORKSPACE" \
            -type f \
            \( -name "settings.gradle.kts" -o -name "settings.gradle" \) \
            -not -path "*/.gradle/*" \
            -not -path "*/build/*" \
            -print \
            -quit)"

          if [ -z "$SETTINGS_PATH" ]; then
            echo "::error::Android project not found"
            exit 1
          fi

          PROJECT_DIR="$(dirname "$SETTINGS_PATH")"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Android project: $PROJECT_DIR"

      - name: Validate signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$KEYSTORE_BASE64" || { echo "::error::ANDROID_KEYSTORE_BASE64 is missing"; exit 1; }
          test -n "$STORE_PASSWORD" || { echo "::error::ANDROID_KEYSTORE_PASSWORD is missing"; exit 1; }
          test -n "$KEY_ALIAS" || { echo "::error::ANDROID_KEY_ALIAS is missing"; exit 1; }
          test -n "$KEY_PASSWORD" || { echo "::error::ANDROID_KEY_PASSWORD is missing"; exit 1; }

      - name: Restore release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > release-keystore.jks
          test -s release-keystore.jks || { echo "::error::Keystore restoration failed"; exit 1; }

          {
            echo "storeFile=release-keystore.jks"
            echo "storePassword=$STORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Prepare environment defaults
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"

          if [ ! -f .env.example ]; then
            printf '%s\n' '# No production secrets are required for the offline app.' > .env.example
          fi

      - name: Build signed Release APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          gradle :app:assembleRelease --stacktrace --no-daemon

      - name: Collect signed APK
        shell: bash
        run: |
          set -euo pipefail

          APK_FILE="$(find "$PROJECT_DIR/app/build/outputs/apk/release" \
            -type f \
            -name "*.apk" \
            ! -name "*unsigned*" \
            -print \
            -quit)"

          if [ -z "$APK_FILE" ]; then
            echo "::error::Signed release APK not found"
            find "$PROJECT_DIR/app/build/outputs" -type f -print || true
            exit 1
          fi

          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          cp "$APK_FILE" "$GITHUB_WORKSPACE/artifacts/ielts-collocation-bazaar-release.apk"

      - name: Upload signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: Bazaar-Signed-Release-APK
          path: artifacts/ielts-collocation-bazaar-release.apk
          if-no-files-found: error
          retention-days: 30
